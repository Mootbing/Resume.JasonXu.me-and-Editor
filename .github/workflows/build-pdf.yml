name: Build resume PDF

on:
  push:
    branches: [main]
    paths:
      - 'REPLACE_ME_resume.tex'
      - '.github/workflows/build-pdf.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-pdf
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile REPLACE_ME_resume.tex with pdflatex
        uses: xu-cheng/latex-action@v3
        with:
          root_file: REPLACE_ME_resume.tex
          working_directory: .
          latexmk_use_xelatex: false
          args: -pdf -interaction=nonstopmode -halt-on-error -file-line-error

      - name: Move PDF into public/
        run: |
          mkdir -p public
          mv REPLACE_ME_resume.pdf public/resume.pdf

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          if git diff --cached --quiet; then
            echo "No PDF changes"
          else
            git commit -m "Auto-build public/resume.pdf from resume.tex [skip ci]"
            git push
          fi
